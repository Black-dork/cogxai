[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cogxai"
version = "2.8.1"
description = "CogxAI — Persistent memory SDK for AI agents. Store, recall, and search memories with hybrid vector + keyword retrieval."
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Black-dork"}]
requires-python = ">=3.8"
dependencies = ["httpx>=0.24.0"]
keywords = ["ai", "memory", "agents", "cognitive", "llm", "embeddings", "mcp", "base", "evm"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://cogxai.org"
Repository = "https://github.com/Black-dork/cogxai"
Documentation = "https://cogxai.org/docs"
